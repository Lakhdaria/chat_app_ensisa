{% extends 'base.html' %}

{% block title %}Créer un salon{% endblock %}

{% block extra_css %}
<style>
    .create-wrapper {
        min-height: calc(100vh - 120px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
    }
    
    .create-card {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
        width: 100%;
        max-width: 500px;
        overflow: hidden;
    }
    
    .create-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 2rem;
        text-align: center;
        color: #fff;
    }
    
    .create-header i {
        font-size: 3rem;
        margin-bottom: 1rem;
    }
    
    .create-header h2 {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0;
    }
    
    .create-body {
        padding: 2rem;
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
    
    .form-label {
        font-weight: 600;
        color: #333;
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
    }
    
    .form-control {
        border: 2px solid #eee;
        border-radius: 10px;
        padding: 0.75rem 1rem;
        font-size: 0.95rem;
        transition: all 0.2s ease;
    }
    
    .form-control:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    textarea.form-control {
        min-height: 100px;
        resize: vertical;
    }
    
    .form-check-custom {
        padding: 1rem;
        background: #f8f9fa;
        border-radius: 10px;
    }
    
    .form-check-input:checked {
        background-color: #667eea;
        border-color: #667eea;
    }
    
    .form-check-description {
        font-size: 0.8rem;
        color: #888;
        margin-left: 1.5rem;
        margin-top: 0.25rem;
    }
    
    .btn-create {
        width: 100%;
        padding: 0.85rem;
        border-radius: 10px;
        font-weight: 600;
        font-size: 1rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        color: #fff;
        transition: all 0.2s ease;
    }
    
    .btn-create:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        color: #fff;
    }
    
    .btn-back {
        display: inline-flex;
        align-items: center;
        color: #666;
        text-decoration: none;
        font-weight: 500;
        margin-bottom: 1rem;
    }
    
    .btn-back:hover {
        color: #667eea;
    }
    
    .error-text {
        color: #dc3545;
        font-size: 0.8rem;
        margin-top: 0.25rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="create-wrapper">
    <div class="create-card">
        <div class="create-header">
            <i class="bi bi-plus-circle-fill"></i>
            <h2>Créer un salon</h2>
        </div>
        
        <div class="create-body">
            <a href="{% url 'home' %}" class="btn-back">
                <i class="bi bi-arrow-left me-2"></i>Retour
            </a>
            
            <form method="post">
                {% csrf_token %}
                
                <div class="form-group">
                    <label class="form-label">
                        <i class="bi bi-chat-dots me-1 text-primary"></i>Nom du salon
                    </label>
                    <input type="text" name="nom" class="form-control" placeholder="Ex: Discussion générale" value="{{ form.nom.value|default:'' }}" required maxlength="100">
                    {% if form.nom.errors %}
                        <div class="error-text">{{ form.nom.errors.0 }}</div>
                    {% endif %}
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <i class="bi bi-text-left me-1 text-primary"></i>Description (optionnelle)
                    </label>
                    <textarea name="description" class="form-control" placeholder="Décrivez le sujet..." rows="3">{{ form.description.value|default:'' }}</textarea>
                </div>
                
                <div class="form-group">
                    <div class="form-check-custom">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="est_prive" id="est_prive" {% if form.est_prive.value %}checked{% endif %}>
                            <label class="form-check-label fw-semibold" for="est_prive">
                                <i class="bi bi-lock me-1"></i>Salon privé
                            </label>
                        </div>
                        <div class="form-check-description">
                            Seuls les membres invités pourront y accéder
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-create">
                    <i class="bi bi-plus-lg me-2"></i>Créer le salon
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
